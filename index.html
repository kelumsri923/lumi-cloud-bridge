<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lumi Cloud Bridge</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            color: #00d4ff;
        }
        
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .status-label {
            font-weight: bold;
        }
        
        .status-value {
            font-family: monospace;
        }
        
        .online {
            color: #4caf50;
        }
        
        .offline {
            color: #f44336;
        }
        
        .section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .section h2 {
            margin-bottom: 15px;
            font-size: 1.3em;
            color: #00d4ff;
        }
        
        .relay-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .relay-label {
            width: 70px;
            font-weight: bold;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        
        .btn-on {
            background: #4caf50;
            color: white;
        }
        
        .btn-off {
            background: #f44336;
            color: white;
        }
        
        .led-preview {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            border-radius: 15px;
            background: rgb(0, 0, 0);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: background 0.1s;
        }
        
        .color-sliders {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .slider-group label {
            width: 40px;
            font-weight: bold;
        }
        
        input[type="range"] {
            flex: 1;
            height: 5px;
            border-radius: 5px;
        }
        
        input[type="range"]:nth-child(2) { background: red; }
        .red { accent-color: red; }
        .green { accent-color: green; }
        .blue { accent-color: blue; }
        
        .btn-set {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
        }
        
        @media (max-width: 480px) {
            .relay-group {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💡 Lumi Cloud Bridge</h1>
        
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">🔌 MQTT Status:</span>
                <span class="status-value" id="mqttStatus">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label">🌐 API Status:</span>
                <span class="status-value" id="apiStatus">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label">📱 Device ID:</span>
                <span class="status-value" id="deviceId">lumi_001</span>
            </div>
        </div>
        
        <div class="section">
            <h2>🔌 Relay Controls</h2>
            <div id="relays"></div>
        </div>
        
        <div class="section">
            <h2>🎨 LED Control</h2>
            <div class="led-preview" id="ledPreview"></div>
            <div class="color-sliders">
                <div class="slider-group">
                    <label style="color:#ff6b6b">R</label>
                    <input type="range" id="red" min="0" max="255" value="0" class="red">
                    <span id="redVal">0</span>
                </div>
                <div class="slider-group">
                    <label style="color:#51cf66">G</label>
                    <input type="range" id="green" min="0" max="255" value="0" class="green">
                    <span id="greenVal">0</span>
                </div>
                <div class="slider-group">
                    <label style="color:#339af0">B</label>
                    <input type="range" id="blue" min="0" max="255" value="0" class="blue">
                    <span id="blueVal">0</span>
                </div>
            </div>
            <button class="btn-set" id="setColor">🎨 Set LED Color</button>
        </div>
        
        <div class="footer">
            Lumi Cloud Bridge v1.0 | Powered by Railway + Vercel
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
